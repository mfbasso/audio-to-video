name: Build Executables

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (runtime + build)
        run: uv sync --extra build

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: make build

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          make download-ffmpeg-windows
          uv run --with pyinstaller pyinstaller --clean packaging/pyinstaller.spec

      - name: Smoke check output (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          test -d dist/audio-to-video
          if [ "${{ runner.os }}" = "macOS" ]; then
            test -f dist/audio-to-video/audio-to-video
          else
            test -f dist/audio-to-video/audio-to-video
          fi

      - name: Smoke check output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "dist/audio-to-video")) { throw "dist/audio-to-video não encontrado" }
          if (!(Test-Path "dist/audio-to-video/audio-to-video.exe")) { throw "Executável não encontrado" }

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf audio-to-video-linux-${{ github.sha }}.tar.gz -C dist audio-to-video

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: tar -czf audio-to-video-macos-${{ github.sha }}.tar.gz -C dist audio-to-video

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/audio-to-video/* -DestinationPath audio-to-video-windows-${{ github.sha }}.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: audio-to-video-linux-${{ github.sha }}
          path: audio-to-video-linux-${{ github.sha }}.tar.gz

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: audio-to-video-macos-${{ github.sha }}
          path: audio-to-video-macos-${{ github.sha }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: audio-to-video-windows-${{ github.sha }}
          path: audio-to-video-windows-${{ github.sha }}.zip

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Generate release timestamp
        id: ts
        run: echo "value=$(date -u +'%Y.%m.%d.%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: audio-to-video-*
          path: release-assets

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ts.outputs.value }}
          name: ${{ steps.ts.outputs.value }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
